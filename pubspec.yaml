name: smart_inventory
description: A Flutter app for managing inventory with authentication screens.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  qr_flutter: ^4.1.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  provider: ^6.0.5
  url_launcher: ^6.2.4
  http: ^1.2.0
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.0.0
  webview_flutter_web: ^0.2.0
  web_socket_channel: ^2.4.0   # WebSocket
  shared_preferences: ^2.2.2   # Save JWT token locally
  mqtt_client: ^10.0.0
  google_sign_in: ^6.2.1
  image_picker: ^1.0.7
  mobile_scanner: ^5.2.3
  path_provider: ^2.1.4
  nfc_manager: ^4.1.1
  flutter_secure_storage: ^10.0.0
  pointycastle: ^4.0.0
  logger: ^2.6.2
  geocoding: ^4.0.0
  location: ^8.0.1
  flutter_slidable: ^4.0.3
  maps_launcher: ^3.0.0
  flutter_speed_dial: ^7.0.0
  file_picker: ^8.0.0
  flutter_settings_screens: ^0.3.4
  universal_io: ^2.3.1
  universal_html: ^2.3.0
  share_plus: ^10.0.0
  intl: ^0.20.2
  marquee: ^2.3.0
  flutter_colorpicker: ^1.1.0
  flutter_blue_plus: ^1.35.5
  permission_handler: ^11.3.1
  fl_chart: ^0.68.0
  sqflite: ^2.3.3+1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
